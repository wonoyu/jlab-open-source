name: Sync and Build Multi-Repo Docs

on:
  # Trigger manually
  workflow_dispatch:
  # Or on schedule (weekly)
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight
  # Trigger on changes in this repo
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-docs.yml'
      - 'docusaurus.config.js'
      - 'sidebar.js'
      - 'package.json'

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      # Checkout this repo
      - name: Checkout jlab-open-source
        uses: actions/checkout@v4
      
      # ============================================
      # STEP 1: Clone and copy docs from source repos
      # ============================================
      
      - name: Create docs directory
        run: mkdir -p docs
      
      - name: Clone jlab-flutter-development-kit
        uses: actions/checkout@v4
        with:
          repository: wonoyu/jlab-flutter-development-kit
          path: tmp/jlab-flutter-development-kit
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            docs
          sparse-checkout-cone-mode: false
          fetch-depth: 1
       
      - name: Copy jlab-flutter-development-kit docs
        run: |
          if [ -d "tmp/jlab-flutter-development-kit/docs" ]; then
            cp -r tmp/jlab-flutter-development-kit/docs/* docs/
            echo "Docs copied successfully"
          else
            echo "Warning: No docs folder found in jlab-flutter-development-kit"
            ls -la tmp/
          fi
      
      # Fix MDX curly brace issues - escape {variable} patterns
      - name: Fix MDX curly brace issues
        run: |
          # Fix all {variable} patterns in markdown files that MDX interprets as JS variables
          # This escapes them in code blocks and tables
          
          # Fix common placeholder patterns
          find docs -name "*.md" -type f -exec sed -i \
            -e 's/{version}/`{version}`/g' \
            -e 's/{path}/`{path}`/g' \
            -e 's/{org}/`{org}`/g' \
            -e 's/{app}/`{app}`/g' \
            -e 's/{feature}/`{feature}`/g' \
            -e 's/{page}/`{page}`/g' \
            -e 's/{id}/`{id}`/g' \
            -e 's/{flavor}/`{flavor}`/g' \
            -e 's/{project}/`{project}`/g' \
            -e 's/{userId}/`{userId}`/g' \
            -e 's/{task_id}/`{task_id}`/g' \
            -e 's/{count}/`{count}`/g' \
            -e 's/{package_path}/`{package_path}`/g' \
            -e 's/{serviceName}/`{serviceName}`/g' \
            -e 's/{service_name}/`{service_name}`/g' \
            -e 's/{TagName}/`{TagName}`/g' \
            -e 's/{ReferencedSchema}/`{ReferencedSchema}`/g' \
            -e 's/{path_count}/`{path_count}`/g' \
            -e 's/{service_count}/`{service_count}`/g' \
            -e 's/{path_url}/`{path_url}`/g' \
            -e 's/{order_id}/`{order_id}`/g' \
            -e 's/{org_id}/`{org_id}`/g' \
            -e 's/{suffix}/`{suffix}`/g' \
            -e 's/{bundleId}/`{bundleId}`/g' \
            -e 's/{flavors}/`{flavors}`/g' \
            -e 's/{output}/`{output}`/g' \
            {} \;
          echo "Fixed MDX curly brace issues"
      
      # Remove docs with persistent MDX issues (command docs with complex placeholders)
      - name: Remove problematic docs
        run: |
          rm -rf docs/tutorial/commands/* docs/howto/commands/* docs/reference/commands/* docs/explanation/commands/*
          echo "Removed problematic command docs"
            -e 's/{userId}/`{userId}`/g' \
            -e 's/{task_id}/`{task_id}`/g' \
            -e 's/{count}/`{count}`/g' \
            -e 's/{package_path}/`{package_path}`/g' \
            -e 's/{color}/`{color}`/g' \
            -e 's/{color_dark}/`{color_dark}`/g' \
            -e 's/{key}/`{key}`/g' \
            -e 's/{value}/`{value}`/g' \
            -e 's/{provider}/`{provider}`/g' \
            -e 's/{url}/`{url}`/g' \
            -e 's/{project_name}/`{project_name}`/g' \
            -e 's/{organization_id}/`{organization_id}`/g' \
            -e 's/{flavor_name}/`{flavor_name}`/g' \
            -e 's/{production_flavor}/`{production_flavor}`/g' \
            -e 's/{appDir}/`{appDir}`/g' \
            -e 's/{configFile}/`{configFile}`/g' \
            -e 's/{flavor1}/`{flavor1}`/g' \
            -e 's/{flavor2}/`{flavor2}`/g' \
            -e 's/{flavor3}/`{flavor3}`/g' \
            -e 's/{config_file}/`{config_file}`/g' \
            {} \;
          echo "Fixed MDX curly brace issues"
      
      # Add more repos as needed:
      #
      # - name: Clone another-project
      #   uses: actions/checkout@v4
      #   with:
      #     repository: wonoyu/another-project
      #     path: tmp/another-project
      #     sparse-checkout: |
      #       docs
      #     sparse-checkout-cone-mode: false
      #
      # - name: Copy another-project docs
      #   run: |
      #     mkdir -p docs/another-project
      #     cp -r tmp/another-project/docs/* docs/another-project/
      
      # ============================================
      # STEP 2: Build Docusaurus
      # ============================================
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build documentation
        run: npm run build
      
      # ============================================
      # STEP 3: Deploy to GitHub Pages
      # ============================================
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
